        -DMLIR_ENABLE_BINDINGS_PYTHON=OFF
        -DLLVM_ENABLE_PROJECTS="mlir;lld"
        -DLLVM_INSTALL_UTILS=ON
        -DLLVM_TARGETS_TO_BUILD="host;NVPTX;AMDGPU"
        -DLLVM_ENABLE_TERMINFO=OFF
        -DLLVM_ENABLE_ZSTD=OFF
        llvm-project/llvm

